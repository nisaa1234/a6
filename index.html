<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>WATCH VIDEO</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family: Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg, #1a0000, #4b0000, #8b0000);
  background-size: 200% 200%;
  animation: bgMove 6s ease infinite;

  padding:15px;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  width:100%;
  max-width:360px;
  background: rgba(255,255,255,0.08);
  padding:28px 22px;
  border-radius:18px;

  box-shadow:0 20px 50px rgba(0,0,0,0.6);

  text-align:center;
  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.15);
}
.download-btn{
  display:block;
  width:100%;
  padding:16px;
  margin:15px 0;
  text-decoration:none;

  font-size:16px;
  font-weight:bold;
  letter-spacing:1px;
  color:#fff;
  background: linear-gradient(135deg, #ff0000, #ff4d4d, #b30000);
  border-radius:12px;

  position:relative;
  overflow:hidden;

  transition:all .3s ease;

  box-shadow:0 0 15px rgba(255,0,0,0.6);
}
.download-btn:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 0 25px rgba(255,0,0,0.9);
}
.download-btn:active{
  transform:scale(0.95);
}
.download-btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;

  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.6),
    transparent
  );

  animation:glow 2s infinite;
}

.arrow-left,
.arrow-right{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  opacity:.8;

  color:#fff;

  animation:arrow 1.2s infinite ease-in-out;
}

.arrow-left{
  left:15px;
}

.arrow-right{
  right:15px;
  animation-delay:.6s;
}

@keyframes glow{
  0%{left:-100%;}
  100%{left:100%;}
}

@keyframes arrow{
  0%{
    opacity:.3;
    transform:translateY(-50%) scale(.8);
  }
  50%{
    opacity:1;
    transform:translateY(-50%) scale(1.3);
  }
  100%{
    opacity:.3;
    transform:translateY(-50%) scale(.8);
  }
}

@media(max-width:480px){

  .container{
    padding:22px 18px;
  }

  .download-btn{
    font-size:15px;
    padding:14px;
  }

}

</style>
</head>

<body>

<div class="container">

  <a href="https://mr-player.pages.dev/?mov=WHLbUCVk1.mp4

" class="download-btn">

    <span class="arrow-left">▶</span>

    PLAY VIDEO

    <span class="arrow-right">◀</span>

  </a>

</div>

</body>
</html>
